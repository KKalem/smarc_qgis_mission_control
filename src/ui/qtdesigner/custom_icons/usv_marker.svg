<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -120 120 210" width="120" height="210">
  <!-- Hull — pointed bow north, flat stern -->
  <path d="M0,-80 C30,-60 40,-20 40,30 L40,55 Q40,65 0,70 Q-40,65 -40,55 L-40,30 C-40,-20 -30,-60 0,-80 Z"
        fill="param(fill)" fill-opacity="param(fill-opacity)"
        stroke="param(outline)" stroke-width="param(outline-width)"/>
  <!-- Bridge -->
  <rect x="-18" y="-10" width="36" height="30" rx="3"
        fill="param(outline)" stroke="param(outline)" stroke-width="1"/>
  <!-- Mast -->
  <circle cx="0" cy="5" r="4" fill="white" opacity="0.85"/>
  <!-- Deck lines -->
  <line x1="-25" y1="-30" x2="25" y2="-30" stroke="param(outline)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="-32" y1="30" x2="32" y2="30" stroke="param(outline)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Bow nose dot -->
  <circle cx="0" cy="-68" r="5" fill="white" opacity="0.9"/>
  <!-- Heading arrow -->
  <line x1="0" y1="-80" x2="0" y2="-108" stroke="param(fill)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="0,-116 -6,-100 6,-100" fill="param(fill)"/>
</svg>